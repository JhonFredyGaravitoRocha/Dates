<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jhon Fredy Garavito | Portfolio</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .project-card { background: white; padding: 20px; margin-bottom: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-bottom: 15px; color: #333; }
        /* Sin más clases complejas de contenedor */
    </style>
</head>
<body>

    <section class="project-card">
        <h3>Tendencias del Petróleo Brent</h3>
        <div id="oil-plot" style="width:100%; height:400px;"></div>
    </section>

    <section class="project-card">
        <h3>Interdependencia: Petróleo vs. Dólar</h3>
        <div id="correlation-plot" style="width:100%; height:400px;"></div>
    </section>

    <script>
        function renderOilChart() {
            const trace = {
                x: ['2024-01', '2024-03', '2024-05', '2024-07'],
                y: [75, 82, 79, 85],
                mode: 'lines+markers',
                line: { color: '#27ae60', width: 3, shape: 'spline' },
                fill: 'tozeroy',
                fillcolor: 'rgba(39, 174, 96, 0.1)'
            };

            const layout = {
                title: 'Precio del Petróleo',
                margin: { t: 30, r: 20, l: 50, b: 40 },
                hovermode: 'x unified'
            };

            Plotly.newPlot('oil-plot', [trace], layout, {responsive: true, displaylogo: false});
        }

        // Ejecutar
        document.addEventListener("DOMContentLoaded", () => {
            renderOilChart();
            // Aquí puedes llamar a tus otras funciones...
        });
    </script>
</body>
</html>
